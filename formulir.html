<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Oprect HijabRn</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffe0f0 0%, #ffc1d9 100%);
      color: #333;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h1 {
      font-family: 'Montserrat', sans-serif;
      color: #d81b60;
      text-align: center;
      margin-bottom: 10px;
      font-size: 3em;
      font-weight: 800; 
      text-shadow: 2px 2px 8px rgba(233, 30, 99, 0.3);
      letter-spacing: 1px;
    }

    p.subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    h2 {
      color: #d81b60;
      border-bottom: 3px solid #f8bbd0;
      padding-bottom: 8px;
      margin-bottom: 20px;
      font-family: 'Montserrat', sans-serif;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .form-card {
      background-color: #fce4ec;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
    }

    .form-card:hover {
      transform: translateY(-3px);
    }

    .form-card:focus-within {
      box-shadow: 0 0 15px rgba(233, 30, 99, 0.25);
      transform: translateY(-4px);
      transition: 0.3s ease;
    }

    label {
      font-weight: bold;
      color: #c2185b;
      display: block;
      margin-bottom: 8px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 15px;
      box-sizing: border-box;
      transition: 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #e91e63;
      box-shadow: 0 0 10px rgba(233, 30, 99, 0.3);
      transition: 0.3s ease;
    }

    textarea {
      resize: vertical;
      height: 80px;
    }

    .radio-group, .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .radio-group label, .checkbox-group label {
      font-weight: normal;
    }

    input[type="radio"], input[type="checkbox"] {
      margin-right: 6px;
    }

    button {
      background: linear-gradient(45deg, #e91e63, #c2185b);
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 17px;
      width: 100%;
      transition: all 0.3s ease;
      margin-top: 15px;
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(45deg, #c2185b, #ad1457);
    }

    .footer-link {
      text-align: center;
      margin-top: 30px;
    }

    .footer-link a {
      color: #e91e63;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>WE'RE HIRING !</h1>
    <p class="subtitle">Bring your creativity to Hijabrn</p>

    <h2>Data Diri</h2>
    <div class="form-grid">
      <div class="form-card">
        <label for="nama">Nama Lengkap:</label>
        <input type="text" id="nama" name="nama">
      </div>
      <div class="form-card">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
      </div>
      <div class="form-card">
        <label for="nohp">Nomor HP:</label>
        <input type="text" id="nohp" name="nohp">
      </div>
      <div class="form-card">
        <label for="posisi">Posisi yang Dilamar:</label>
        <select id="posisi" name="posisi">
          <option value="">-- Pilih Posisi --</option>
          <option value="desainer">Desainer Grafis</option>
          <option value="marketing">Marketing Digital</option>
          <option value="admin">Admin Media Sosial</option>
          <option value="content">Content Creator</option>
        </select>
      </div>
    </div>

    <h2>Informasi Tambahan</h2>
    <div class="form-card">
      <label>Jenis Kelamin:</label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="Laki-laki"> Laki-laki</label>
        <label><input type="radio" name="gender" value="Perempuan"> Perempuan</label>
      </div>
    </div>

    <div class="form-card">
      <label>Bidang yang Diminati:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" value="Desain"> Desain</label>
        <label><input type="checkbox" value="Konten"> Konten</label>
        <label><input type="checkbox" value="Marketing"> Marketing</label>
        <label><input type="checkbox" value="Event"> Event</label>
      </div>
    </div>

    <div class="form-card">
      <label for="alasan">Ceritain sedikit kenapa kamu pengin join:</label>
      <textarea id="alasan" name="alasan"></textarea>
    </div>

    <button type="submit">Kirim Lamaran Sekarang ✨</button>

    <div class="footer-link">
      <p>Udah punya akun HR? <a href="#">Login di sini</a></p>
    </div>
  </div>
</body>
</html>
